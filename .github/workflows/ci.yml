name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect package manifest
        id: manifest
        run: |
          if ls **/package.json >/dev/null 2>&1; then
            echo "HAS_PACKAGE_JSON=true" >> "$GITHUB_ENV"
          else
            echo "HAS_PACKAGE_JSON=false" >> "$GITHUB_ENV"
          fi
      - uses: pnpm/action-setup@v4
        if: env.HAS_PACKAGE_JSON == 'true'
        with:
          version: 10.19.0
          run_install: false
      - uses: actions/setup-node@v4
        if: env.HAS_PACKAGE_JSON == 'true'
        with:
          node-version: 20.10.0
          cache: 'pnpm'
      - name: Verify pnpm
        if: env.HAS_PACKAGE_JSON == 'true'
        run: pnpm --version
      - name: Install dependencies
        if: env.HAS_PACKAGE_JSON == 'true'
        run: pnpm install
      - name: Lint
        if: env.HAS_PACKAGE_JSON == 'true'
        run: pnpm lint
      - name: Test
        if: env.HAS_PACKAGE_JSON == 'true'
        run: pnpm test
      - name: Typecheck
        if: env.HAS_PACKAGE_JSON == 'true'
        run: pnpm typecheck
